name: Preview Docs

on:
  pull_request:
    branches:
      - main

concurrency:
  group: preview-docs-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  deploy-preview:
    # Fork PRs don't have write permission to push to gh-pages.
    # Only PRs from branches within this repository get previews.
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Upgrade npm for OIDC support
        run: npm install -g npm@11.11.0 && npm install -g npm@latest

      - run: pnpm install --frozen-lockfile

      - name: Build docs preview
        run: npx nx build docs-site
        env:
          BASE_URL: /pr/${{ github.event.pull_request.number }}/

      - name: Deploy preview to gh-pages
        run: |
          PR_NUMBER=${{ github.event.pull_request.number }}
          PREVIEW_DIR="pr/${PR_NUMBER}"

          git clone --branch gh-pages --single-branch --depth 1 \
            "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" \
            gh-pages-repo

          rm -rf "gh-pages-repo/${PREVIEW_DIR}"
          mkdir -p "gh-pages-repo/${PREVIEW_DIR}"
          cp -r docs-site/dist/client/* "gh-pages-repo/${PREVIEW_DIR}/"

          cd gh-pages-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Deploy docs preview for PR #${PR_NUMBER}" --allow-empty
          git push origin gh-pages

      - name: Comment preview URL
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.payload.pull_request.number;
            const previewUrl = `https://git-switchboard.com/pr/${prNumber}/`;
            const marker = '<!-- docs-preview-comment -->';
            const body = `${marker}\n**Docs Preview:** ${previewUrl}`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            });
            const existing = comments.find(c => c.body?.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body,
              });
            }
