name: Release

on:
  workflow_dispatch:
    inputs:
      specifier:
        description: "Version bump (major, minor, patch, or explicit like 1.2.3)"
        required: false
        type: string
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write

jobs:
  # Phase 1: Version + Changelog (manual dispatch only)
  version:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - run: |
          git config user.name "${GITHUB_ACTOR}"
          git config user.email "${GITHUB_ACTOR}@users.noreply.github.com"
      - uses: oven-sh/setup-bun@v2
      - uses: pnpm/action-setup@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org/

      - name: Upgrade npm for OIDC support
        # Two-step upgrade: npm 10.9.7 (bundled with Node 22.22.2) crashes
        # self-upgrading directly to npm@latest due to npm/cli#9151.
        # First upgrade to 11.11.0 (which still bundles promise-retry),
        # then to latest.
        run: npm install -g npm@11.11.0 && npm install -g npm@latest

      - run: pnpm install --frozen-lockfile
      - name: Version and changelog
        run: |
          npx nx release version ${{ github.event.inputs.specifier || '' }}
          VERSION=$(node -p "require('./packages/git-switchboard/package.json').version")
          npx nx release changelog "$VERSION"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Push version commit and tags
        run: git push --follow-tags

  # Phase 2: Build native binaries on matching platforms
  build-native:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    strategy:
      matrix:
        include:
          - target: bun-darwin-arm64
            output: git-switchboard-darwin-arm64
            os: macos-latest
          - target: bun-darwin-x64
            output: git-switchboard-darwin-x64
            os: macos-13
          - target: bun-linux-x64
            output: git-switchboard-linux-x64
            os: ubuntu-latest
          - target: bun-linux-arm64
            output: git-switchboard-linux-arm64
            os: ubuntu-24.04-arm
          - target: bun-windows-x64
            output: git-switchboard-windows-x64.exe
            os: windows-latest
          - target: bun-windows-arm64
            output: git-switchboard-windows-arm64.exe
            os: windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - uses: pnpm/action-setup@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org/

      - name: Upgrade npm for OIDC support
        # Two-step upgrade workaround for npm/cli#9151
        run: npm install -g npm@11.11.0 && npm install -g npm@latest
      - run: pnpm install --frozen-lockfile
      - name: Build native binary
        run: npx nx run git-switchboard:build:native -- ${{ matrix.target }}
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.output }}
          path: packages/git-switchboard/native-builds/${{ matrix.output }}

  # Phase 3: Publish (after all native builds complete)
  publish:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    needs: build-native
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: oven-sh/setup-bun@v2
      - uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org/

      - name: Upgrade npm for OIDC support
        # Two-step upgrade workaround for npm/cli#9151
        run: npm install -g npm@11.11.0 && npm install -g npm@latest

      - run: pnpm install --frozen-lockfile

      # Extract version from tag (v1.2.3 -> 1.2.3)
      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      # Build JS bundle
      - name: Build JS bundle
        run: npx nx run git-switchboard:build

      # Download all native binaries
      - uses: actions/download-artifact@v4
        with:
          path: packages/git-switchboard/native-builds
          merge-multiple: true

      # Create GitHub Release with all assets
      - name: Upload to GitHub Release
        run: |
          cd packages/git-switchboard
          gh release upload "${{ github.ref_name }}" \
            native-builds/git-switchboard-darwin-arm64 \
            native-builds/git-switchboard-darwin-x64 \
            native-builds/git-switchboard-linux-x64 \
            native-builds/git-switchboard-linux-arm64 \
            native-builds/git-switchboard-windows-x64.exe \
            native-builds/git-switchboard-windows-arm64.exe \
            dist/git-switchboard.js
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Publish to npm
      - name: Publish to npm
        run: npx nx release publish

      # Update Homebrew tap
      - name: Update Homebrew tap
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.TAP_GITHUB_TOKEN }}
          repository: git-switchboard/homebrew-tap
          event-type: release
          client-payload: '{"version": "${{ steps.version.outputs.version }}", "tag": "${{ github.ref_name }}"}'

      # Publish Chocolatey package
      - name: Publish to Chocolatey
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          WINDOWS_URL="https://github.com/git-switchboard/git-switchboard/releases/download/${{ github.ref_name }}/git-switchboard-windows-x64.exe"
          CHECKSUM=$(sha256sum packages/git-switchboard/native-builds/git-switchboard-windows-x64.exe | awk '{print $1}')
          # Render nuspec and install script into a staging directory
          mkdir -p /tmp/choco-staging/tools
          sed "s/{{VERSION}}/$VERSION/g" packaging/choco/git-switchboard.nuspec > /tmp/choco-staging/git-switchboard.nuspec
          sed -e "s|{{URL}}|$WINDOWS_URL|g" -e "s/{{CHECKSUM}}/$CHECKSUM/g" packaging/choco/tools/chocolateyinstall.ps1 > /tmp/choco-staging/tools/chocolateyinstall.ps1
          # Install choco on ubuntu via mono
          sudo apt-get install -y mono-complete
          wget -q https://dist.nuget.org/win-x86-commandline/latest/nuget.exe -O /tmp/nuget.exe
          cd /tmp/choco-staging
          mono /tmp/nuget.exe pack git-switchboard.nuspec
          # Push via Chocolatey API using curl
          curl -X PUT \
            -H "X-NuGet-ApiKey: ${{ secrets.CHOCO_API_KEY }}" \
            -F "package=@git-switchboard.$VERSION.nupkg" \
            https://push.chocolatey.org/api/v2/package
