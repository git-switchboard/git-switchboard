extends: capitalization
message: "Use sentence case for headings. '%s' should be '%s'."
level: error
scope: heading
match: $sentence
indicators:
  - ':'
exceptions:
  # Project-specific
  - CLI
  - TUI
  - API
  - APIs
  - TypeScript
  - JavaScript
  - Node.js
  - JSON
  - YAML
  - TOML
  - CSS
  - HTML
  # Tools and frameworks
  - GitHub
  - GitHub Actions
  - ESLint
  - Prettier
  - Homebrew
  - Chocolatey
  - Vike
  - React
  - npm
  - pnpm
  - Bun
  # Abbreviations
  - AI
  - CI
  - CD
  - URL
  - URLs
  - PR
  - PRs
  - IDE
  - IDEs
  - SSR
  - SSG
  - E2E
  # Platforms
  - macOS
  - Linux
  - Windows
  # Project identifiers
  - git-switchboard
