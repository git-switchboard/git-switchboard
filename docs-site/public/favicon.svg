<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="git-switchboard">
  <title>git-switchboard</title>
  <defs>
    <!-- Amber glow on active contact -->
    <filter id="amber-glow" x="-120%" y="-120%" width="340%" height="340%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Arc of travel: centered on pivot (32,52), radius 41 -->
  <path
    d="M 10 14 A 41 41 0 0 1 54 14"
    fill="none"
    stroke="#243848"
    stroke-width="2"
  />

  <!-- Contact A — amber, active (left) -->
  <!-- Glow layer -->
  <circle cx="10" cy="14" r="11" fill="#ecb030" opacity="0.18" filter="url(#amber-glow)"/>
  <!-- Ring -->
  <circle cx="10" cy="14" r="9.5" fill="#101820" stroke="#ecb030" stroke-width="2.5"/>
  <!-- Inner fill -->
  <circle cx="10" cy="14" r="5" fill="#ecb030"/>

  <!-- Contact B — blue, inactive (right) -->
  <!-- Ring -->
  <circle cx="54" cy="14" r="9.5" fill="#101820" stroke="#50a0e0" stroke-width="2" opacity="0.6"/>
  <!-- Inner fill -->
  <circle cx="54" cy="14" r="4.5" fill="#50a0e0" opacity="0.45"/>

  <!-- Ghost arm — pointing toward inactive contact -->
  <line
    x1="32" y1="52"
    x2="54" y2="15"
    stroke="#50a0e0"
    stroke-width="4"
    stroke-linecap="round"
    opacity="0.18"
  />

  <!-- Active arm — pointing toward amber contact -->
  <line
    x1="32" y1="52"
    x2="10" y2="15"
    stroke="#d8eaf5"
    stroke-width="5.5"
    stroke-linecap="round"
  />

  <!-- Pivot — ring + center axle dot -->
  <circle cx="32" cy="52" r="9.5" fill="#101820" stroke="#d8eaf5" stroke-width="2.5"/>
  <circle cx="32" cy="52" r="3.5" fill="#d8eaf5"/>
</svg>
